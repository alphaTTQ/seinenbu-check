    #setup-banner {

      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;

    table { width: 100%; border-collapse: collapse; background: #fff; }

      background: #dde8f0;
      padding: 10px 8px;
      text-align: center;
      font-size: 12px;
      position: sticky;
      top: 48px;
      z-index: 9;
      border-bottom: 2px solid #b0c8dc;
    }
    tbody tr { border-bottom: 1px solid #e8e8e8; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody td { padding: 10px 8px; vertical-align: middle; }
    .col-branch { width: 68px; color: #555; font-size: 12px; }
    .col-name   { width: 80px; font-size: 13px; }
    .col-shop   { font-size: 12px; color: #444; }
    .col-check  { width: 52px; text-align: center; }
    .col-divider { width: 1px; padding: 0; background: #b0c8dc; }
    tbody .col-divider { background: #d0d0d0; }
    .col-action { width: 36px; text-align: center; padding: 4px; }

    .check-cell {
      display: inline-block;
      width: 32px; height: 32px; line-height: 32px;
      font-size: 18px;
      border-radius: 7px;
      border: 2px solid #ccc;
      background: #fafafa;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-cell.checked { background: #e8f5e9; border-color: #43a047; color: #2e7d32; }
    .check-cell:active { opacity: 0.6; }

    .branch-header td {
      background: #2c5f8a; color: #fff;
      font-weight: bold; font-size: 13px;
      padding: 6px 8px; letter-spacing: 0.05em;
    }

      display: none;
      align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-size: 17px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn  { color: #bbb; }
    .edit-btn { color: #555; font-size: 15px; }
    .del-btn:active  { background: #fee2e2; color: #c62828; }
    .edit-btn:active { background: #e8f0fe; color: #1a56a0; }
    body.delete-mode .del-btn  { display: inline-flex; }
    body.edit-mode   .edit-btn { display: inline-flex; }

    #fab-group {
      position: fixed;
      bottom: 20px; right: 16px;
      display: flex;
      gap: 10px;
      z-index: 50;
    }
    .fab {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.15s;
    }
    .fab:active { opacity: 0.8; transform: scale(0.93); }
    #fab-add  { background: #2c5f8a; }
    #fab-del  { background: #2c5f8a; }
    #fab-edit { background: #2c5f8a; }
    #fab-del.active  { background: #c62828; }
    #fab-edit.active { background: #c62828; }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }

      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 18px;
      width: min(88vw, 340px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      text-align: center;

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {

      font-size: 15px; font-weight: bold; cursor: pointer;

</head>

  </div>
</div>

  { id:'b69', branch:'茨城',     name:'難波和世',      shop:'春日薬局' },
  { id:'b70', branch:'東京西',   name:'中島　慎一郎',  shop:'石井薬局' },

];

// ─── 状態 ───
const state = {
  additions: {}, deleted: {}, edits: {},
  checks_e: {}, checks_f: {}, checks_g: {}
};

function getAllRows() {
  return [
    ...BASE_ROWS,
    ...Object.entries(state.additions).map(([id, v]) => ({ id, ...v }))
  ];
}

function getRow(id) {
  const r = getAllRows().find(r => r.id === id);
  if (!r) return null;
  const ed = state.edits[id];
  return ed ? { ...r, name: ed.name ?? r.name, shop: ed.shop ?? r.shop } : r;
}

function getVisibleRows() {
  return getAllRows()
    .filter(r => !state.deleted[r.id])
    .map(r => {
      const ed = state.edits[r.id];
      return ed ? { ...r, name: ed.name ?? r.name, shop: ed.shop ?? r.shop } : r;
    })
    .sort((a, b) => {
      const ga = GROUP_ORDER[BRANCH_TO_GROUP[a.branch]] ?? 99;
      const gb = GROUP_ORDER[BRANCH_TO_GROUP[b.branch]] ?? 99;
      if (ga !== gb) return ga - gb;
      const oa = BRANCH_ORDER[a.branch] ?? 99;
      const ob = BRANCH_ORDER[b.branch] ?? 99;
      return oa !== ob ? oa - ob : (a.id < b.id ? -1 : 1);
    });
}

// ─── 描画 ───
function renderTable() {
  const rows = getVisibleRows();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const countEl = document.getElementById('total-count');
  if (countEl) countEl.textContent = '（' + rows.length + '名）';
  let prevGroup = null;
  rows.forEach(row => {
    const group = BRANCH_TO_GROUP[row.branch] || row.branch;
    if (group !== prevGroup) {
      const hdr = document.createElement('tr');
      hdr.className = 'branch-header';
      hdr.innerHTML = `<td colspan="9">── ${group} ──</td>`;
      tbody.appendChild(hdr);
      prevGroup = group;
    }
    const ce = state.checks_e[row.id];
    const cf = state.checks_f[row.id];
    const cg = state.checks_g[row.id];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-branch">${row.branch}</td>
      <td class="col-name">${row.name}</td>
      <td class="col-shop">${row.shop}</td>
      <td class="col-check"><span class="check-cell${ce?' checked':''}" data-id="${row.id}" data-col="e">${ce?'✔':''}</span></td>
      <td class="col-divider"></td>
      <td class="col-check"><span class="check-cell${cf?' checked':''}" data-id="${row.id}" data-col="f">${cf?'✔':''}</span></td>
      <td class="col-divider"></td>
      <td class="col-check"><span class="check-cell${cg?' checked':''}" data-id="${row.id}" data-col="g">${cg?'✔':''}</span></td>
      <td class="col-action">
        <button class="row-action-btn del-btn"  data-id="${row.id}" aria-label="削除">❌</button>
        <button class="row-action-btn edit-btn" data-id="${row.id}" aria-label="修正">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── 確認モーダル ───
function showModal({ icon, title, body, okLabel, okDanger, onOk }) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-icon').textContent  = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML    = body;
  const okBtn = document.getElementById('modal-ok');
  okBtn.textContent = okLabel;
  okBtn.className   = okDanger ? 'danger' : '';
  overlay.classList.add('show');

  const close = () => overlay.classList.remove('show');
  const handleOk     = () => { close(); onOk(); cleanup(); };
  const handleCancel = () => { close(); cleanup(); };
  const handleOut    = e => { if (e.target === overlay) { close(); cleanup(); } };
  function cleanup() {
    okBtn.removeEventListener('click', handleOk);
    document.getElementById('modal-cancel').removeEventListener('click', handleCancel);
    overlay.removeEventListener('click', handleOut);
  }
  okBtn.addEventListener('click', handleOk);
  document.getElementById('modal-cancel').addEventListener('click', handleCancel);
  overlay.addEventListener('click', handleOut);
}

// ─── Firebase ───
const isConfigured = firebaseConfig.apiKey !== 'YOUR_API_KEY';
if (isConfigured) document.getElementById('setup-banner').style.display = 'none';

let fbRefs = {};
if (isConfigured) {
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  fbRefs = {
    additions: db.ref('additions'),
    deleted:   db.ref('deleted'),
    edits:     db.ref('edits'),
    checks_e:  db.ref('checks_e'),
    checks_f:  db.ref('checks_f'),
    checks_g:  db.ref('checks_g'),
  };
  fbRefs.additions.on('value', s => { state.additions = s.val() || {}; renderTable(); });
  fbRefs.deleted  .on('value', s => { state.deleted   = s.val() || {}; renderTable(); });
  fbRefs.edits    .on('value', s => { state.edits     = s.val() || {}; renderTable(); });
  fbRefs.checks_e .on('value', s => { state.checks_e  = s.val() || {}; renderTable(); });
  fbRefs.checks_f .on('value', s => { state.checks_f  = s.val() || {}; renderTable(); });
  fbRefs.checks_g .on('value', s => { state.checks_g  = s.val() || {}; renderTable(); });
} else {
  renderTable();
}

// ─── テーブルクリック ───
document.getElementById('tbody').addEventListener('click', e => {
  // チェック
  const cell = e.target.closest('.check-cell');
  if (cell) {
    const id  = cell.dataset.id;
    const col = cell.dataset.col;
    const newVal = !state[`checks_${col}`][id];
    const row = getRow(id);
    const label = col === 'e' ? '会計済み' : col === 'f' ? '個別領収書' : '宛名希望';
    const extraNote = (col === 'g' && newVal && !state.checks_f[id])
      ? '<br><small style="color:#888">※個別領収書も同時にチェックされます</small>' : '';
    showModal({
      icon: newVal ? '✔' : '🗑️',
      title: newVal ? `「${label}」にしますか？` : `「${label}」のチェックを外しますか？`,
      body: `<strong>${row.name}</strong><br>${row.shop}${extraNote}`,
      okLabel: newVal ? '済みにする' : '外す',
      okDanger: !newVal,
      onOk: () => {
        if (isConfigured) {
          fbRefs[`checks_${col}`].child(id).set(newVal ? true : null);
          if (col === 'g' && newVal) fbRefs.checks_f.child(id).set(true);
        } else {
          if (newVal) state[`checks_${col}`][id] = true; else delete state[`checks_${col}`][id];
          if (col === 'g' && newVal) state.checks_f[id] = true;
          renderTable();
        }
      }
    });
    return;
  }

  // 削除
  const delBtn = e.target.closest('.del-btn');
  if (delBtn) {
    const id  = delBtn.dataset.id;
    const row = getRow(id);
    showModal({
      icon: '🗑️',
      title: 'このメンバーを削除しますか？',
      body: `<strong>${row.name}</strong><br>${row.shop}<br><small style="color:#888">${row.branch}</small>`,
      okLabel: '削除する',
      okDanger: true,
      onOk: () => {
        if (isConfigured) fbRefs.deleted.child(id).set(true);
        else { state.deleted[id] = true; renderTable(); }
      }
    });
    return;
  }

  // 編集
  const editBtn = e.target.closest('.edit-btn');
  if (editBtn) {
    const id  = editBtn.dataset.id;
    const row = getRow(id);
    document.getElementById('edit-name').value = row.name;
    document.getElementById('edit-shop').value = row.shop;
    document.getElementById('edit-overlay').classList.add('show');
    document.getElementById('edit-submit').onclick = () => {
      const newName = document.getElementById('edit-name').value.trim();
      const newShop = document.getElementById('edit-shop').value.trim();
      if (!newName || !newShop) { alert('氏名と店名を入力してください'); return; }
      document.getElementById('edit-overlay').classList.remove('show');
      showModal({
        icon: '✏️',
        title: 'この内容で修正しますか？',
        body: `<strong>${newName}</strong><br>${newShop}<br><small style="color:#888">${row.branch}</small>`,
        okLabel: '修正する',
        okDanger: false,
        onOk: () => {
          if (isConfigured) {
            fbRefs.edits.child(id).set({ name: newName, shop: newShop });
          } else {
            state.edits[id] = { name: newName, shop: newShop };
            renderTable();
          }
        }
      });
    };
  }
});

// ─── 編集フォームキャンセル ───
document.getElementById('edit-cancel').addEventListener('click', () => {
  document.getElementById('edit-overlay').classList.remove('show');
});
document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-overlay'))
    document.getElementById('edit-overlay').classList.remove('show');
});

// ─── FABグループ ───
// 追加
document.getElementById('fab-add').addEventListener('click', () => {
  document.getElementById('fab-del').classList.remove('active');
  document.getElementById('fab-edit').classList.remove('active');
  document.body.classList.remove('delete-mode', 'edit-mode');
  document.getElementById('form-name').value = '';
  document.getElementById('form-shop').value = '';
  document.getElementById('form-branch').selectedIndex = 0;
  document.getElementById('add-overlay').classList.add('show');
});
document.getElementById('add-cancel').addEventListener('click', () => {
  document.getElementById('add-overlay').classList.remove('show');
});
document.getElementById('add-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('add-overlay'))
    document.getElementById('add-overlay').classList.remove('show');
});
document.getElementById('add-submit').addEventListener('click', () => {
  const branch = document.getElementById('form-branch').value;
  const name   = document.getElementById('form-name').value.trim();
  const shop   = document.getElementById('form-shop').value.trim();
  if (!name || !shop) { alert('氏名と店名を入力してください'); return; }
  document.getElementById('add-overlay').classList.remove('show');
  showModal({
    icon: '➕',
    title: 'このメンバーを追加しますか？',
    body: `<strong>${name}</strong><br>${shop}<br><small style="color:#888">${branch}</small>`,
    okLabel: '追加する',
    okDanger: false,
    onOk: () => {
      if (isConfigured) fbRefs.additions.push({ branch, name, shop });
      else { state.additions['c'+Date.now()] = { branch, name, shop }; renderTable(); }
    }
  });
});

// 削除モードトグル
document.getElementById('fab-del').addEventListener('click', () => {
  const btn = document.getElementById('fab-del');
  const active = btn.classList.toggle('active');
  document.body.classList.toggle('delete-mode', active);
  // 編集モードはOFF
  document.getElementById('fab-edit').classList.remove('active');
  document.body.classList.remove('edit-mode');
});

// 編集モードトグル
document.getElementById('fab-edit').addEventListener('click', () => {
  const btn = document.getElementById('fab-edit');
  const active = btn.classList.toggle('active');
  document.body.classList.toggle('edit-mode', active);
  // 削除モードはOFF
  document.getElementById('fab-del').classList.remove('active');
  document.body.classList.remove('delete-mode');
});

// ─── モード外タップでオフ ───
document.addEventListener('click', e => {
  if (document.body.classList.contains('delete-mode')) {
    if (!e.target.closest('.del-btn') && !e.target.closest('#fab-del')) {
      document.body.classList.remove('delete-mode');
      document.getElementById('fab-del').classList.remove('active');
    }
  }
  if (document.body.classList.contains('edit-mode')) {
    if (!e.target.closest('.edit-btn') && !e.target.closest('#fab-edit') && !e.target.closest('#edit-overlay')) {
      document.body.classList.remove('edit-mode');
      document.getElementById('fab-edit').classList.remove('active');
    }
  }
});

// ─── 支部ドロップダウン生成 ───
const sel = document.getElementById('form-branch');
BRANCHES.forEach(b => {
  const opt = document.createElement('option');
  opt.value = b; opt.textContent = b;
  sel.appendChild(opt);
});
</script>
